{% extends "base.html" %}
{% block content %}
<h1>Аналитика контактов</h1>

<div style="display: flex; flex-wrap: wrap;">
    <div style="width: 45%; margin: 10px;">
        <canvas id="sphereChart"></canvas>
    </div>
    <div style="width: 45%; margin: 10px;">
        <canvas id="forgottenChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
fetch("/api/sphere_distribution")
  .then(r => r.json())
  .then(data => {
    const ctx = document.getElementById("sphereChart").getContext("2d");
    new Chart(ctx, {
      type: "pie",
      data: {
        labels: data.map(d => d.sphere || "Без сферы"),
        datasets: [{
          data: data.map(d => d.count),
          backgroundColor: ["#FF6384","#36A2EB","#FFCE56","#4BC0C0","#9966FF","#FF9F40","#C9CBCF"]
        }]
      },
      options: { responsive: true, plugins: { legend: { position: "bottom" } } }
    });
  });

fetch("/api/top_forgotten")
  .then(r => r.json())
  .then(data => {
    const ctx = document.getElementById("forgottenChart").getContext("2d");
    new Chart(ctx, {
      type: "bar",
      data: {
        labels: data.map(d => d.name),
        datasets: [{
          label: "Дней без общения",
          data: data.map(d => d.days),
          backgroundColor: "#36A2EB"
        }]
      },
      options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });
  });
</script>
{% endblock %}
